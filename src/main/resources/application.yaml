quarkus:
  http:
    port: ${HTTP_PORT:8080}
    ssl-port: ${HTTPS_PORT:8443}
    insecure-requests: enabled
    ssl:
      certificate:
        files: ${HTTPS_CERT_FILE:/etc/inboxbridge/certs/backend.crt}
        key-files: ${HTTPS_KEY_FILE:/etc/inboxbridge/certs/backend.key}
  datasource:
    db-kind: postgresql
    jdbc:
      url: ${JDBC_URL:jdbc:postgresql://postgres:5432/inboxbridge}
    username: ${JDBC_USERNAME:inboxbridge}
    password: ${JDBC_PASSWORD:inboxbridge}
  hibernate-orm:
    database:
      generation: validate
    log:
      sql: false
  flyway:
    migrate-at-start: true
  log:
    category:
      "dev.inboxbridge":
        level: INFO

inboxbridge:
  poll-enabled: ${POLL_ENABLED:true}
  poll-interval: ${POLL_INTERVAL:5m}
  fetch-window: ${FETCH_WINDOW:50}
  source-host-min-spacing: ${SOURCE_HOST_MIN_SPACING:PT1S}
  source-host-max-concurrency: ${SOURCE_HOST_MAX_CONCURRENCY:2}
  destination-provider-min-spacing: ${DESTINATION_PROVIDER_MIN_SPACING:PT0.25S}
  destination-provider-max-concurrency: ${DESTINATION_PROVIDER_MAX_CONCURRENCY:1}
  throttle-lease-ttl: ${THROTTLE_LEASE_TTL:PT2M}
  adaptive-throttle-max-multiplier: ${ADAPTIVE_THROTTLE_MAX_MULTIPLIER:6}
  success-jitter-ratio: ${SUCCESS_JITTER_RATIO:0.2}
  max-success-jitter: ${MAX_SUCCESS_JITTER:PT30S}
  multi-user-enabled: ${MULTI_USER_ENABLED:true}
  security:
    passkeys:
      enabled: ${SECURITY_PASSKEYS_ENABLED:true}
      rp-id: ${SECURITY_PASSKEY_RP_ID:localhost}
      rp-name: ${SECURITY_PASSKEY_RP_NAME:InboxBridge}
      origins: ${SECURITY_PASSKEY_ORIGINS:${PUBLIC_BASE_URL:https://localhost:3000}}
      challenge-ttl: ${SECURITY_PASSKEY_CHALLENGE_TTL:PT5M}
  gmail:
    destination-user: ${GMAIL_DESTINATION_USER:me}
    client-id: ${GOOGLE_CLIENT_ID:replace-me}
    client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
    refresh-token: ${GOOGLE_REFRESH_TOKEN:replace-me}
    redirect-uri: ${GOOGLE_REDIRECT_URI:${PUBLIC_BASE_URL:https://localhost:3000}/api/google-oauth/callback}
    create-missing-labels: ${GMAIL_CREATE_MISSING_LABELS:true}
    never-mark-spam: ${GMAIL_NEVER_MARK_SPAM:false}
    process-for-calendar: ${GMAIL_PROCESS_FOR_CALENDAR:false}
  microsoft:
    tenant: ${MICROSOFT_TENANT:consumers}
    client-id: ${MICROSOFT_CLIENT_ID:replace-me}
    client-secret: ${MICROSOFT_CLIENT_SECRET:replace-me}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:${PUBLIC_BASE_URL:https://localhost:3000}/api/microsoft-oauth/callback}
  sources:
    # Keep real source credentials out of this file. Configure them in .env
    # with indexed variables like MAIL_ACCOUNT_0__* and MAIL_ACCOUNT_1__*.
    - id: ${MAIL_ACCOUNT_0__ID:source-0}
      enabled: ${MAIL_ACCOUNT_0__ENABLED:false}
      protocol: ${MAIL_ACCOUNT_0__PROTOCOL:IMAP}
      host: ${MAIL_ACCOUNT_0__HOST:imap.example.com}
      port: ${MAIL_ACCOUNT_0__PORT:993}
      tls: ${MAIL_ACCOUNT_0__TLS:true}
      auth-method: ${MAIL_ACCOUNT_0__AUTH_METHOD:PASSWORD}
      oauth-provider: ${MAIL_ACCOUNT_0__OAUTH_PROVIDER:NONE}
      username: ${MAIL_ACCOUNT_0__USERNAME:replace-me@example.com}
      password: ${MAIL_ACCOUNT_0__PASSWORD:replace-me}
      oauth-refresh-token: ${MAIL_ACCOUNT_0__OAUTH_REFRESH_TOKEN:}
      folder: ${MAIL_ACCOUNT_0__FOLDER:INBOX}
      unread-only: ${MAIL_ACCOUNT_0__UNREAD_ONLY:false}
      custom-label: ${MAIL_ACCOUNT_0__CUSTOM_LABEL:Imported/Source0}
