quarkus:
  http:
    port: ${HTTP_PORT:8080}
    ssl-port: ${HTTPS_PORT:8443}
    insecure-requests: disabled
    cors:
      enabled: true
      headers: Authorization,Content-Type
      methods: GET,POST,DELETE,HEAD,OPTIONS
      origins: /chrome-extension:\\/\\/.*/,/moz-extension:\\/\\/.*/,/safari-web-extension:\\/\\/.*/
    ssl:
      certificate:
        files: ${HTTPS_CERT_FILE:/etc/inboxbridge/certs/backend.crt}
        key-files: ${HTTPS_KEY_FILE:/etc/inboxbridge/certs/backend.key}
  datasource:
    db-kind: postgresql
    jdbc:
      url: ${JDBC_URL:jdbc:postgresql://postgres:5432/inboxbridge?sslmode=verify-full&sslrootcert=/etc/inboxbridge/certs/ca.crt}
    username: ${JDBC_USERNAME:inboxbridge}
    password: ${JDBC_PASSWORD:inboxbridge}
  hibernate-orm:
    schema-management:
      strategy: validate
    log:
      sql: false
  flyway:
    migrate-at-start: true
  log:
    category:
      "dev.inboxbridge":
        level: INFO

inboxbridge:
  poll-enabled: ${POLL_ENABLED:true}
  poll-interval: ${POLL_INTERVAL:5m}
  fetch-window: ${FETCH_WINDOW:50}
  source-host-min-spacing: ${SOURCE_HOST_MIN_SPACING:PT1S}
  source-host-max-concurrency: ${SOURCE_HOST_MAX_CONCURRENCY:2}
  destination-provider-min-spacing: ${DESTINATION_PROVIDER_MIN_SPACING:PT0.25S}
  destination-provider-max-concurrency: ${DESTINATION_PROVIDER_MAX_CONCURRENCY:1}
  throttle-lease-ttl: ${THROTTLE_LEASE_TTL:PT2M}
  adaptive-throttle-max-multiplier: ${ADAPTIVE_THROTTLE_MAX_MULTIPLIER:6}
  success-jitter-ratio: ${SUCCESS_JITTER_RATIO:0.2}
  max-success-jitter: ${MAX_SUCCESS_JITTER:PT30S}
  multi-user-enabled: ${MULTI_USER_ENABLED:true}
  mail:
    connection-timeout: ${MAIL_CONNECTION_TIMEOUT:PT20S}
    operation-timeout: ${MAIL_OPERATION_TIMEOUT:PT20S}
    idle-operation-timeout: ${MAIL_IDLE_OPERATION_TIMEOUT:PT0S}
  security:
    auth:
      login-failure-threshold: ${SECURITY_AUTH_LOGIN_FAILURE_THRESHOLD:5}
      login-initial-block: ${SECURITY_AUTH_LOGIN_INITIAL_BLOCK:PT5M}
      login-max-block: ${SECURITY_AUTH_LOGIN_MAX_BLOCK:PT1H}
      registration-challenge-enabled: ${SECURITY_AUTH_REGISTRATION_CHALLENGE_ENABLED:true}
      registration-challenge-ttl: ${SECURITY_AUTH_REGISTRATION_CHALLENGE_TTL:PT10M}
      registration-challenge-provider: ${SECURITY_AUTH_REGISTRATION_CHALLENGE_PROVIDER:ALTCHA}
      registration-captcha:
        altcha:
          algorithm: ${SECURITY_AUTH_REGISTRATION_ALTCHA_ALGORITHM:PBKDF2/SHA-256}
          cost: ${SECURITY_AUTH_REGISTRATION_ALTCHA_COST:250}
          key-length: ${SECURITY_AUTH_REGISTRATION_ALTCHA_KEY_LENGTH:32}
          key-prefix: ${SECURITY_AUTH_REGISTRATION_ALTCHA_KEY_PREFIX:00}
          hmac-key: ${SECURITY_AUTH_REGISTRATION_ALTCHA_HMAC_KEY:}
        turnstile:
          site-key: ${SECURITY_AUTH_REGISTRATION_TURNSTILE_SITE_KEY:}
          secret: ${SECURITY_AUTH_REGISTRATION_TURNSTILE_SECRET:}
        hcaptcha:
          site-key: ${SECURITY_AUTH_REGISTRATION_HCAPTCHA_SITE_KEY:}
          secret: ${SECURITY_AUTH_REGISTRATION_HCAPTCHA_SECRET:}
      geo-ip:
        enabled: ${SECURITY_AUTH_GEO_IP_ENABLED:false}
        primary-provider: ${SECURITY_AUTH_GEO_IP_PRIMARY_PROVIDER:IPWHOIS}
        fallback-providers: ${SECURITY_AUTH_GEO_IP_FALLBACK_PROVIDERS:IPAPI_CO,IP_API,IPINFO_LITE}
        cache-ttl: ${SECURITY_AUTH_GEO_IP_CACHE_TTL:PT720H}
        provider-cooldown: ${SECURITY_AUTH_GEO_IP_PROVIDER_COOLDOWN:PT5M}
        request-timeout: ${SECURITY_AUTH_GEO_IP_REQUEST_TIMEOUT:PT3S}
        ipinfo-token: ${SECURITY_AUTH_GEO_IP_IPINFO_TOKEN:}
    passkeys:
      enabled: ${SECURITY_PASSKEYS_ENABLED:true}
      rp-id: ${SECURITY_PASSKEY_RP_ID:${PUBLIC_HOSTNAME:localhost}}
      rp-name: ${SECURITY_PASSKEY_RP_NAME:InboxBridge}
      origins: ${SECURITY_PASSKEY_ORIGINS:${PUBLIC_BASE_URL:https://${PUBLIC_HOSTNAME:localhost}:${PUBLIC_PORT:3000}}}
      challenge-ttl: ${SECURITY_PASSKEY_CHALLENGE_TTL:PT5M}
    remote:
      enabled: ${SECURITY_REMOTE_ENABLED:true}
      session-ttl: ${SECURITY_REMOTE_SESSION_TTL:PT12H}
      poll-rate-limit-count: ${SECURITY_REMOTE_POLL_RATE_LIMIT_COUNT:60}
      poll-rate-limit-window: ${SECURITY_REMOTE_POLL_RATE_LIMIT_WINDOW:PT1M}
      service-token: ${SECURITY_REMOTE_SERVICE_TOKEN:}
      service-username: ${SECURITY_REMOTE_SERVICE_USERNAME:}
    extension:
      access-token-ttl: ${SECURITY_EXTENSION_ACCESS_TOKEN_TTL:PT1H}
      refresh-token-ttl: ${SECURITY_EXTENSION_REFRESH_TOKEN_TTL:PT720H}
  gmail:
    destination-user: ${GMAIL_DESTINATION_USER:me}
    client-id: ${GOOGLE_CLIENT_ID:replace-me}
    client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
    refresh-token: ${GOOGLE_REFRESH_TOKEN:replace-me}
    redirect-uri: ${GOOGLE_REDIRECT_URI:${PUBLIC_BASE_URL:https://${PUBLIC_HOSTNAME:localhost}:${PUBLIC_PORT:3000}}/api/google-oauth/callback}
    create-missing-labels: ${GMAIL_CREATE_MISSING_LABELS:true}
    never-mark-spam: ${GMAIL_NEVER_MARK_SPAM:false}
    process-for-calendar: ${GMAIL_PROCESS_FOR_CALENDAR:false}
  microsoft:
    tenant: ${MICROSOFT_TENANT:consumers}
    client-id: ${MICROSOFT_CLIENT_ID:replace-me}
    client-secret: ${MICROSOFT_CLIENT_SECRET:replace-me}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:${PUBLIC_BASE_URL:https://${PUBLIC_HOSTNAME:localhost}:${PUBLIC_PORT:3000}}/api/microsoft-oauth/callback}
  sources:
    # Keep real source credentials out of this file. Configure them in .env
    # with indexed variables like MAIL_ACCOUNT_0__* and MAIL_ACCOUNT_1__*.
    - id: ${MAIL_ACCOUNT_0__ID:source-0}
      enabled: ${MAIL_ACCOUNT_0__ENABLED:false}
      protocol: ${MAIL_ACCOUNT_0__PROTOCOL:IMAP}
      host: ${MAIL_ACCOUNT_0__HOST:imap.example.com}
      port: ${MAIL_ACCOUNT_0__PORT:993}
      tls: ${MAIL_ACCOUNT_0__TLS:true}
      auth-method: ${MAIL_ACCOUNT_0__AUTH_METHOD:PASSWORD}
      oauth-provider: ${MAIL_ACCOUNT_0__OAUTH_PROVIDER:NONE}
      username: ${MAIL_ACCOUNT_0__USERNAME:replace-me@example.com}
      password: ${MAIL_ACCOUNT_0__PASSWORD:replace-me}
      oauth-refresh-token: ${MAIL_ACCOUNT_0__OAUTH_REFRESH_TOKEN:}
      folder: ${MAIL_ACCOUNT_0__FOLDER:INBOX}
      unread-only: ${MAIL_ACCOUNT_0__UNREAD_ONLY:false}
      fetch-mode: ${MAIL_ACCOUNT_0__FETCH_MODE:POLLING}
      custom-label: ${MAIL_ACCOUNT_0__CUSTOM_LABEL:Imported/Source0}

security:
  token-encryption-key: ${SECURITY_TOKEN_ENCRYPTION_KEY:replace-me}
  token-encryption-key-id: ${SECURITY_TOKEN_ENCRYPTION_KEY_ID:v1}

"%test":
  quarkus:
    http:
      ssl-port: 0
      ssl:
        certificate:
          files: ""
          key-files: ""
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:inboxbridge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      username: sa
      password: sa
    hibernate-orm:
      schema-management:
        strategy: drop-and-create
    flyway:
      migrate-at-start: false
