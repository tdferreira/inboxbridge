server {
  listen 80;
  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/inboxbridge/certs/frontend.crt;
  ssl_certificate_key /etc/inboxbridge/certs/frontend.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass https://inboxbridge:8443/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_name inboxbridge;
    proxy_ssl_server_name on;
    proxy_ssl_verify on;
    proxy_ssl_trusted_certificate /etc/inboxbridge/certs/ca.crt;
  }

  location / {
    try_files $uri /index.html;
  }
}
