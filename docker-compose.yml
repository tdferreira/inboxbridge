services:
  cert-init:
    image: alpine:3.20
    container_name: inboxbridge-cert-init
    volumes:
      - ./certs:/certs
      - ./docker:/opt/inboxbridge/docker:ro
    env_file:
      - .env
    command: ["sh", "/opt/inboxbridge/docker/cert-init.sh"]
    restart: "no"

  inboxbridge:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: inboxbridge
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./certs:/etc/inboxbridge/certs:ro
    env_file:
      - .env
    restart: unless-stopped

  inboxbridge-admin:
    build:
      context: .
      dockerfile: admin-ui/Dockerfile
      network: host
    container_name: inboxbridge-admin
    ports:
      - "3000:443"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      inboxbridge:
        condition: service_started
    volumes:
      - ./certs:/etc/inboxbridge/certs:ro
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: inboxbridge-postgres
    environment:
      POSTGRES_DB: inboxbridge
      POSTGRES_USER: inboxbridge
      POSTGRES_PASSWORD: inboxbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inboxbridge -d inboxbridge"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
